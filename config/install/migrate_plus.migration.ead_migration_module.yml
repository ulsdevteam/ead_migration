langcode: en
status: true
dependencies: {  }
id: ead_repository_item_migration
migration_group: ead_migration_module
label: 'EAD to Drupal repository item migration'
source:
  plugin: uls_ead_source
process:
  type:
    plugin: default_value
    default_value: islandora_object
  title:
    -
      plugin: str_replace
      source: title
      regex: true
      search: '#<(/)?emph#'
      replace: '<\1em'
    -
      plugin: callback
      callable: trim
  status:
    plugin: default_value
    default_value: 0
  uid:
    plugin: default_value
    default_value: 1
  field_model: field_model
  field_domain_access: field_domain_access
  field_genre: field_genre
  field_ead_xml_media:
    plugin: ead_xml_processor
    source:
      - id
      - file_path
      - filename
destination:
  plugin: 'entity:node'
  bundle: islandora_object
migration_dependencies: null
